<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>StudyMate · Student Planner</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%233b82f6' rx='20'/%3E%3Cpath d='M25 30 L45 30 L45 70 L25 70 Q20 70 20 65 L20 35 Q20 30 25 30' fill='white' opacity='0.9'/%3E%3Crect x='48' y='35' width='25' height='35' rx='4' fill='white' opacity='0.9'/%3E%3Ccircle cx='70' cy='52' r='12' fill='none' stroke='white' stroke-width='4' /%3E%3Cpath d='M70 46 L70 54 L76 58' stroke='white' stroke-width='4' fill='none' /%3E%3Cpath d='M32 75 L42 75 L37 85 Z' fill='%23fbbf24' /%3E%3C/svg%3E">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      transition: background 0.2s;
    }

    /* container iPhone 13 size 390x844 + rounded corners */
    #app {
      width: 390px;
      height: 844px;
      background: #ffffff;
      border-radius: 44px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
    }

    /* tema light (default) */
    .theme-light {
      --bg-app: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --border: #e2e8f0;
      --card-bg: #ffffff;
      --accent: #3b82f6;
      --accent-soft: #dbeafe;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      --nav-bg: #ffffff;
      --input-bg: #ffffff;
    }

    /* tema dark */
    .theme-dark {
      --bg-app: #0f172a;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --border: #334155;
      --card-bg: #1e293b;
      --accent: #60a5fa;
      --accent-soft: #1e3a8a;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      --nav-bg: #0f172a;
      --input-bg: #1e293b;
    }

    #app {
      background: var(--bg-app);
    }

    /* HEADER - fixed (tidak ikut scroll) */
    .app-header {
      padding: 20px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--bg-app);
      /* safe area top */
      padding-top: max(20px, env(safe-area-inset-top));
      flex-shrink: 0;
    }
    .app-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .app-header i {
      font-size: 1.4rem;
      color: var(--accent);
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .app-header i:active {
      opacity: 0.7;
    }

    /* MAIN - scrollable area */
    .app-main {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: var(--bg-app);
    }

    /* BOTTOM NAV - fixed (tidak ikut scroll) */
    .bottom-nav {
      display: flex;
      justify-content: space-around;
      padding: 10px 16px 14px;
      border-top: 1px solid var(--border);
      background: var(--nav-bg);
      flex-shrink: 0;
      /* safe area bottom */
      padding-bottom: max(14px, env(safe-area-inset-bottom));
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text-secondary);
      font-size: 0.7rem;
      gap: 4px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .nav-item.active {
      color: var(--accent);
    }
    .nav-item i {
      font-size: 1.3rem;
    }

    /* card styling */
    .card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 18px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: all 0.2s;
    }
    .task-header, .schedule-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .matkul-badge {
      background: var(--accent-soft);
      color: var(--accent);
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .task-title {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text-primary);
      margin: 8px 0 4px;
    }
    .task-desc {
      color: var(--text-secondary);
      font-size: 0.85rem;
      white-space: pre-wrap;
      margin: 8px 0;
      line-height: 1.4;
    }
    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 0.7rem;
      margin: 12px 0;
    }
    .task-meta span {
      background: var(--accent-soft);
      padding: 4px 10px;
      border-radius: 30px;
      color: var(--text-primary);
    }
    .task-check-row {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      align-items: center;
    }
    .task-check-row label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--text-primary);
    }
    .task-check-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--accent);
    }
    .btn-icon {
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      color: var(--text-secondary);
      margin-left: 12px;
      transition: color 0.2s;
    }
    .btn-icon:active {
      color: var(--accent);
    }

    /* form elements - TIDAK transparan, solid background */
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.9rem;
    }
    .form-control, select, textarea, input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text-primary);
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .form-control:focus, select:focus, textarea:focus, input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 40px;
      font-weight: 600;
      width: 100%;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:active {
      opacity: 0.85;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      margin-top: 8px;
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    /* sort bar */
    .sort-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .sort-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .sort-group select {
      width: auto;
      padding: 8px 12px;
      background: var(--input-bg);
    }
    .sort-direction {
      display: flex;
      gap: 6px;
    }
    .sort-direction button {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 6px 12px;
      cursor: pointer;
      color: var(--text-primary);
    }
    .sort-direction button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }
    .schedule-item {
      margin-bottom: 12px;
    }
    .schedule-item:last-child {
      margin-bottom: 0;
    }

    /* MODAL - tidak transparan, solid */
    .modal-container {
      background: var(--bg-app);
      border-radius: 32px;
      width: 90%;
      max-width: 360px;
      padding: 24px;
      max-height: 85vh;
      overflow-y: auto;
      border: 1px solid var(--border);
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
    }
    .radio-group {
      display: flex;
      gap: 24px;
      align-items: center;
      margin-top: 8px;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: var(--text-primary);
    }
    .radio-group input[type="radio"] {
      width: auto;
      margin: 0;
      accent-color: var(--accent);
    }
    .hidden {
      display: none;
    }
    /* tambahan untuk tombol tambah cepat */
    .fab-like {
      background: var(--accent);
      border-radius: 40px;
      padding: 8px 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
  (function() {
    // ---------- STATE ----------
    let appState = {
      currentPage: 'tasks',
      tasks: [],
      schedules: [],
      settings: {
        theme: 'light',
      },
      sortTasks: {
        by: 'default',
        deadlineDir: 'asc',
        difficultyDir: 'asc',
      }
    };

    // Helpers
    function saveState() {
      localStorage.setItem('studymate_final', JSON.stringify(appState));
    }

    function loadState() {
      try {
        const saved = localStorage.getItem('studymate_final');
        if (saved) {
          const parsed = JSON.parse(saved);
          appState = { ...appState, ...parsed };
          if (!appState.tasks) appState.tasks = [];
          if (!appState.schedules) appState.schedules = [];
          if (!appState.sortTasks) appState.sortTasks = { by: 'default', deadlineDir: 'asc', difficultyDir: 'asc' };
          if (!appState.settings) appState.settings = { theme: 'light' };
        }
      } catch(e) {}
      // data awal jika kosong (demo)
      if (appState.schedules.length === 0) {
        appState.schedules.push({ id: 's1', matkul: 'Pemrograman Web', day: 'Senin', time: '10:00-12:00', lecturer: 'Dr. Andi' });
        appState.schedules.push({ id: 's2', matkul: 'Basis Data', day: 'Rabu', time: '13:00-15:00', lecturer: 'Prof. Budi' });
        saveState();
      }
      if (appState.tasks.length === 0) {
        const deadline = new Date();
        deadline.setDate(deadline.getDate() + 3);
        appState.tasks.push({
          id: Date.now(),
          matkul: 'Pemrograman Web',
          nama: 'Membuat Aplikasi Student Planner',
          deskripsi: 'Implementasi fitur tugas dan jadwal sesuai requirement.',
          tanggal_diberikan: new Date().toISOString().slice(0,16),
          deadline: deadline.toISOString().slice(0,16),
          kesulitan: 'sedang',
          kelompok: false,
          dosen: 'Dr. Andi',
          selesai: false,
          dikumpul: false,
          createdAt: Date.now()
        });
        saveState();
      }
    }

    function applyTheme() {
      const appDiv = document.getElementById('app');
      if (appDiv) {
        appDiv.classList.remove('theme-light', 'theme-dark');
        appDiv.classList.add(`theme-${appState.settings.theme}`);
      }
      const body = document.body;
      if (appState.settings.theme === 'dark') {
        body.style.background = '#0f172a';
      } else {
        body.style.background = '#f1f5f9';
      }
    }

    function getLecturerByMatkul(matkul) {
      const sch = appState.schedules.find(s => s.matkul === matkul);
      return sch ? sch.lecturer : '';
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function sortTasksList(tasks) {
      const { by, deadlineDir, difficultyDir } = appState.sortTasks;
      const copy = [...tasks];
      if (by === 'default') return copy.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
      if (by === 'deadline') {
        return copy.sort((a,b) => {
          const da = new Date(a.deadline).getTime();
          const db = new Date(b.deadline).getTime();
          return deadlineDir === 'asc' ? da - db : db - da;
        });
      }
      if (by === 'difficulty') {
        const rank = { 'mudah': 1, 'sedang': 2, 'susah': 3, '': 0 };
        return copy.sort((a,b) => {
          const ra = rank[a.kesulitan] || 0;
          const rb = rank[b.kesulitan] || 0;
          return difficultyDir === 'asc' ? ra - rb : rb - ra;
        });
      }
      return copy;
    }

    function renderTaskCard(task, isHistory) {
      const deadlineDate = new Date(task.deadline);
      const formattedDeadline = deadlineDate.toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
      let givenFormatted = '-';
      if (task.tanggal_diberikan) {
        const givenDate = new Date(task.tanggal_diberikan);
        givenFormatted = givenDate.toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
      }
      const diffMap = { mudah: '🟢 Mudah', sedang: '🟡 Sedang', susah: '🔴 Susah' };
      const diffText = task.kesulitan ? diffMap[task.kesulitan] || task.kesulitan : '-';
      const kelompokText = task.kelompok ? '👥 Kelompok' : '👤 Individu';
      return `
        <div class="card" data-task-id="${task.id}">
          <div class="task-header">
            <span class="matkul-badge">${escapeHtml(task.matkul)}</span>
            <div>
              <i class="fas fa-edit btn-icon" onclick="window.editTask('${task.id}')"></i>
              <i class="fas fa-trash btn-icon" onclick="window.deleteTask('${task.id}')"></i>
            </div>
          </div>
          <div class="task-title">${escapeHtml(task.nama)}</div>
          <div class="task-desc">${escapeHtml(task.deskripsi).replace(/\n/g, '<br>')}</div>
          <div class="task-meta">
            <span><i class="far fa-calendar-alt"></i> Tenggat: ${formattedDeadline}</span>
            <span><i class="far fa-calendar-check"></i> Diberikan: ${givenFormatted}</span>
            <span>📚 ${diffText}</span>
            <span>${kelompokText}</span>
            ${task.dosen ? `<span>👨‍🏫 ${escapeHtml(task.dosen)}</span>` : ''}
          </div>
          ${!isHistory ? `
          <div class="task-check-row">
            <label><input type="checkbox" class="task-selesai" data-id="${task.id}" ${task.selesai ? 'checked' : ''}> Selesai</label>
            <label><input type="checkbox" class="task-dikumpul" data-id="${task.id}" ${task.dikumpul ? 'checked' : ''}> Dikumpul</label>
          </div>
          ` : `
          <div class="task-check-row">
            <span><i class="fas fa-check-circle"></i> Selesai ✓</span>
            ${task.dikumpul ? '<span><i class="fas fa-box"></i> Sudah dikumpul</span>' : '<span>Belum dikumpul</span>'}
          </div>
          `}
        </div>
      `;
    }

    // Render halaman
    function render() {
      const appDiv = document.getElementById('app');
      if (!appDiv) return;
      let pageTitle = '';
      if (appState.currentPage === 'tasks') pageTitle = 'Tugas Aktif';
      else if (appState.currentPage === 'history') pageTitle = 'Riwayat Tugas';
      else if (appState.currentPage === 'schedule') pageTitle = 'Jadwal Kuliah';
      else pageTitle = 'Pengaturan';

      let html = `
        <div class="app-header">
          <h1>${pageTitle}</h1>
          <i class="fas fa-cog" onclick="window.navigateTo('settings')"></i>
        </div>
        <div class="app-main">
      `;

      if (appState.currentPage === 'tasks') html += renderTasksPage();
      else if (appState.currentPage === 'history') html += renderHistoryPage();
      else if (appState.currentPage === 'schedule') html += renderSchedulePage();
      else if (appState.currentPage === 'settings') html += renderSettingsPage();

      html += `</div><div class="bottom-nav">`;
      const pages = [
        { id: 'tasks', icon: 'fas fa-tasks', label: 'Tugas' },
        { id: 'history', icon: 'fas fa-history', label: 'Riwayat' },
        { id: 'schedule', icon: 'fas fa-calendar-week', label: 'Jadwal' },
        { id: 'settings', icon: 'fas fa-sliders-h', label: 'Setelan' }
      ];
      pages.forEach(p => {
        html += `<div class="nav-item ${appState.currentPage === p.id ? 'active' : ''}" onclick="window.navigateTo('${p.id}')">
          <i class="${p.icon}"></i><span>${p.label}</span>
        </div>`;
      });
      html += `</div>`;
      appDiv.innerHTML = html;
      applyTheme();
      attachDynamicEvents();
    }

    function renderTasksPage() {
      let activeTasks = appState.tasks.filter(t => !t.selesai);
      activeTasks = sortTasksList(activeTasks);
      if (activeTasks.length === 0) {
        return `<div class="empty-state"><i class="fas fa-check-circle"></i> <p>Belum ada tugas aktif.</p><button class="btn" style="margin-top:16px;" onclick="window.openAddTask()">+ Tambah Tugas Baru</button></div>`;
      }
      let sortHtml = `
        <div class="sort-bar">
          <div class="sort-group">
            <span>Urut:</span>
            <select id="sort-by">
              <option value="default" ${appState.sortTasks.by === 'default' ? 'selected' : ''}>Default</option>
              <option value="deadline" ${appState.sortTasks.by === 'deadline' ? 'selected' : ''}>Tenggat</option>
              <option value="difficulty" ${appState.sortTasks.by === 'difficulty' ? 'selected' : ''}>Kesulitan</option>
            </select>
          </div>
          ${appState.sortTasks.by !== 'default' ? `
          <div class="sort-direction">
            <button id="sort-asc" class="${appState.sortTasks.by === 'deadline' ? (appState.sortTasks.deadlineDir === 'asc' ? 'active' : '') : (appState.sortTasks.difficultyDir === 'asc' ? 'active' : '')}"><i class="fas fa-sort-amount-up-alt"></i></button>
            <button id="sort-desc" class="${appState.sortTasks.by === 'deadline' ? (appState.sortTasks.deadlineDir === 'desc' ? 'active' : '') : (appState.sortTasks.difficultyDir === 'desc' ? 'active' : '')}"><i class="fas fa-sort-amount-down-alt"></i></button>
          </div>
          ` : ''}
          <button class="btn-icon" onclick="window.openAddTask()" style="font-size:1.4rem;"><i class="fas fa-plus-circle"></i></button>
        </div>
        <div id="task-list">`;
      activeTasks.forEach(task => { sortHtml += renderTaskCard(task, false); });
      sortHtml += `</div>`;
      return sortHtml;
    }

    function renderHistoryPage() {
      let completed = appState.tasks.filter(t => t.selesai);
      if (completed.length === 0) return `<div class="empty-state"><i class="fas fa-archive"></i><p>Belum ada tugas selesai</p></div>`;
      let html = `<div class="sort-bar"><span>Riwayat Terselesaikan</span></div>`;
      completed.forEach(task => { html += renderTaskCard(task, true); });
      return html;
    }

    function renderSchedulePage() {
      let html = `<div style="margin-bottom:16px;"><button class="btn" onclick="window.openAddSchedule()"><i class="fas fa-plus"></i> Tambah Jadwal</button></div>`;
      if (appState.schedules.length === 0) html += `<div class="empty-state">Belum ada jadwal. Yuk tambah!</div>`;
      appState.schedules.forEach(sch => {
        html += `
          <div class="card schedule-item">
            <div class="schedule-header">
              <strong>${escapeHtml(sch.matkul)}</strong>
              <div><i class="fas fa-edit btn-icon" onclick="window.editSchedule('${sch.id}')"></i><i class="fas fa-trash btn-icon" onclick="window.deleteSchedule('${sch.id}')"></i></div>
            </div>
            <div><i class="far fa-calendar-alt"></i> ${sch.day} · ${sch.time || '-'}</div>
            <div><i class="fas fa-chalkboard-user"></i> Dosen: ${escapeHtml(sch.lecturer || '-')}</div>
          </div>`;
      });
      return html;
    }

    function renderSettingsPage() {
      return `
        <div class="card">
          <h3 style="margin-bottom:12px;">Tampilan</h3>
          <div class="form-group">
            <label>Tema</label>
            <select id="theme-settings">
              <option value="light" ${appState.settings.theme === 'light' ? 'selected' : ''}>Terang</option>
              <option value="dark" ${appState.settings.theme === 'dark' ? 'selected' : ''}>Gelap</option>
            </select>
          </div>
          <h3 style="margin: 20px 0 8px 0;">Mata Kuliah Terdaftar</h3>
          <div id="matkul-list" style="margin-bottom:20px;">
            ${(() => {
              const unik = [...new Set(appState.schedules.map(s => s.matkul))];
              if (!unik.length) return '<p>Tidak ada mata kuliah</p>';
              return unik.map(m => `<div style="padding:6px 0;">📘 ${escapeHtml(m)}</div>`).join('');
            })()}
          </div>
          <button class="btn" id="reset-data" style="background:#ef4444;">Reset Semua Data</button>
        </div>
      `;
    }

    function attachDynamicEvents() {
      // checkboxes tugas aktif
      document.querySelectorAll('.task-selesai').forEach(cb => {
        cb.addEventListener('change', (e) => {
          const id = e.target.dataset.id;
          const task = appState.tasks.find(t => t.id == id);
          if (task) { task.selesai = e.target.checked; saveState(); render(); }
        });
      });
      document.querySelectorAll('.task-dikumpul').forEach(cb => {
        cb.addEventListener('change', (e) => {
          const id = e.target.dataset.id;
          const task = appState.tasks.find(t => t.id == id);
          if (task) { task.dikumpul = e.target.checked; saveState(); }
        });
      });
      const sortBy = document.getElementById('sort-by');
      if (sortBy) sortBy.addEventListener('change', (e) => { appState.sortTasks.by = e.target.value; saveState(); render(); });
      const asc = document.getElementById('sort-asc');
      const desc = document.getElementById('sort-desc');
      if (asc) asc.addEventListener('click', () => { if(appState.sortTasks.by === 'deadline') appState.sortTasks.deadlineDir='asc'; else if(appState.sortTasks.by === 'difficulty') appState.sortTasks.difficultyDir='asc'; saveState(); render(); });
      if (desc) desc.addEventListener('click', () => { if(appState.sortTasks.by === 'deadline') appState.sortTasks.deadlineDir='desc'; else if(appState.sortTasks.by === 'difficulty') appState.sortTasks.difficultyDir='desc'; saveState(); render(); });
      const themeSel = document.getElementById('theme-settings');
      if (themeSel) themeSel.addEventListener('change', (e) => { appState.settings.theme = e.target.value; saveState(); applyTheme(); render(); });
      const resetBtn = document.getElementById('reset-data');
      if (resetBtn) resetBtn.addEventListener('click', () => { if(confirm('Hapus semua data? Tugas dan jadwal akan hilang.')) { localStorage.removeItem('studymate_final'); location.reload(); } });
    }

    // MODAL TUGAS dengan input solid
    function showTaskFormModal(taskId) {
      const task = taskId ? appState.tasks.find(t => t.id == taskId) : null;
      if (appState.schedules.length === 0) { alert('Belum ada mata kuliah. Buat jadwal dulu!'); window.navigateTo('schedule'); return; }
      let matkulOptions = '<option value="">-- Pilih --</option>';
      const unikMatkul = [...new Set(appState.schedules.map(s => s.matkul))];
      unikMatkul.forEach(m => { matkulOptions += `<option value="${escapeHtml(m)}" ${task && task.matkul === m ? 'selected' : ''}>${escapeHtml(m)}</option>`; });
      const modalHtml = `
        <div id="modal-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; display:flex; align-items:center; justify-content:center;">
          <div class="modal-container">
            <h3>${task ? 'Edit Tugas' : 'Tugas Baru'}</h3>
            <form id="task-modal-form">
              <div class="form-group"><label>Mata Kuliah</label><select id="task-matkul" required>${matkulOptions}</select></div>
              <div class="form-group"><label>Nama Tugas</label><input id="task-nama" value="${task ? escapeHtml(task.nama) : ''}" required></div>
              <div class="form-group"><label>Deskripsi</label><textarea id="task-desc">${task ? escapeHtml(task.deskripsi) : ''}</textarea></div>
              <div class="form-group"><label>Tanggal Diberikan</label><input type="datetime-local" id="task-tgl-given" value="${task ? (task.tanggal_diberikan || '') : ''}"></div>
              <div class="form-group"><label>Tenggat</label><input type="datetime-local" id="task-deadline" value="${task ? (task.deadline || '') : ''}" required></div>
              <div class="form-group"><label>Kesulitan</label><select id="task-diff"><option value="">-</option><option value="mudah" ${task?.kesulitan === 'mudah' ? 'selected' : ''}>Mudah</option><option value="sedang" ${task?.kesulitan === 'sedang' ? 'selected' : ''}>Sedang</option><option value="susah" ${task?.kesulitan === 'susah' ? 'selected' : ''}>Susah</option></select></div>
              <div class="form-group"><label>Jenis</label><div class="radio-group"><label><input type="radio" name="kelompok" value="individu" ${task ? (!task.kelompok ? 'checked' : '') : 'checked'}> Individu</label><label><input type="radio" name="kelompok" value="kelompok" ${task?.kelompok ? 'checked' : ''}> Kelompok</label></div></div>
              <button type="submit" class="btn">Simpan</button>
              <button type="button" class="btn-outline" onclick="window.closeModal()">Batal</button>
            </form>
          </div>
        </div>`;
      document.body.insertAdjacentHTML('beforeend', modalHtml);
      document.getElementById('task-modal-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const matkul = document.getElementById('task-matkul').value;
        const nama = document.getElementById('task-nama').value.trim();
        const deskripsi = document.getElementById('task-desc').value;
        const tglGiven = document.getElementById('task-tgl-given').value;
        const deadline = document.getElementById('task-deadline').value;
        const kesulitan = document.getElementById('task-diff').value;
        const kelompokVal = document.querySelector('input[name="kelompok"]:checked').value;
        const kelompok = kelompokVal === 'kelompok';
        const dosen = getLecturerByMatkul(matkul);
        if (!matkul || !nama || !deadline) { alert('Lengkapi data wajib!'); return; }
        const taskData = { matkul, nama, deskripsi, tanggal_diberikan: tglGiven, deadline, kesulitan, kelompok, dosen, selesai: task ? task.selesai : false, dikumpul: task ? task.dikumpul : false, createdAt: task ? task.createdAt : Date.now() };
        if (task) Object.assign(task, taskData);
        else appState.tasks.push({ id: Date.now(), ...taskData });
        saveState();
        window.closeModal();
        render();
      });
    }

    function showScheduleModal(scheduleId) {
      const schedule = scheduleId ? appState.schedules.find(s => s.id == scheduleId) : null;
      const modalHtml = `
        <div id="modal-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; display:flex; align-items:center; justify-content:center;">
          <div class="modal-container">
            <h3>${schedule ? 'Edit Jadwal' : 'Jadwal Baru'}</h3>
            <form id="schedule-modal-form">
              <div class="form-group"><label>Mata Kuliah</label><input id="schedule-matkul" value="${schedule ? escapeHtml(schedule.matkul) : ''}" required></div>
              <div class="form-group"><label>Hari</label><select id="schedule-day"><option>Senin</option><option>Selasa</option><option>Rabu</option><option>Kamis</option><option>Jumat</option><option>Sabtu</option><option>Minggu</option></select></div>
              <div class="form-group"><label>Jam (cth: 10:00-12:00)</label><input id="schedule-time" value="${schedule ? schedule.time : ''}"></div>
              <div class="form-group"><label>Dosen</label><input id="schedule-lecturer" value="${schedule ? escapeHtml(schedule.lecturer) : ''}"></div>
              <button type="submit" class="btn">Simpan</button>
              <button type="button" class="btn-outline" onclick="window.closeModal()">Batal</button>
            </form>
          </div>
        </div>`;
      document.body.insertAdjacentHTML('beforeend', modalHtml);
      if (schedule) document.getElementById('schedule-day').value = schedule.day;
      document.getElementById('schedule-modal-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const matkul = document.getElementById('schedule-matkul').value.trim();
        const day = document.getElementById('schedule-day').value;
        const time = document.getElementById('schedule-time').value;
        const lecturer = document.getElementById('schedule-lecturer').value.trim();
        if (!matkul) { alert('Nama mata kuliah wajib'); return; }
        if (schedule) { schedule.matkul = matkul; schedule.day = day; schedule.time = time; schedule.lecturer = lecturer; }
        else { appState.schedules.push({ id: Date.now().toString(), matkul, day, time, lecturer }); }
        saveState();
        window.closeModal();
        render();
      });
    }

    // global functions
    window.navigateTo = (page) => { appState.currentPage = page; render(); };
    window.openAddTask = () => showTaskFormModal(null);
    window.editTask = (id) => showTaskFormModal(id);
    window.deleteTask = (id) => { if(confirm('Hapus tugas?')) { appState.tasks = appState.tasks.filter(t => t.id != id); saveState(); render(); } };
    window.openAddSchedule = () => showScheduleModal(null);
    window.editSchedule = (id) => showScheduleModal(id);
    window.deleteSchedule = (id) => { if(confirm('Hapus jadwal?')) { appState.schedules = appState.schedules.filter(s => s.id != id); saveState(); render(); } };
    window.closeModal = () => { const modal = document.getElementById('modal-overlay'); if(modal) modal.remove(); };

    loadState();
    render();
  })();
</script>
</body>
</html>
